name: Update Airport Parking Data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crewportal-data-writes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch airport parking data
        shell: bash
        run: timeout 45s python3 scripts/update_airport_parking.py

      - name: Publish verified airport parking data
        shell: bash
        run: bash scripts/commit_data_file.sh data/airport-parking.json "Update airport parking data"
