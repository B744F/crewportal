name: Update Parking Data

on:
  schedule:
    # 每 5 分鐘執行一次 (UTC)
    - cron: "*/5 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create parking.json
        run: |
          mkdir -p data

          cat > data/parking.json << EOF
          {
            "BOT":"--",
            "TSA":"--",
            "RD1A":"--",
            "RD1B":"--",
            "updatedAt":"$(date -u +"%Y-%m-%d %H:%M UTC")"
          }
          EOF

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/parking.json

          git diff --cached --quiet || git commit -m "Auto update parking data"

          git push
