name: Update Crew and Airport Parking Data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crewportal-parking-writes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch and validate crew parking data
        shell: bash
        run: timeout 65s python3 scripts/update_parking.py

      - name: Fetch and validate airport parking data
        id: airport
        continue-on-error: true
        shell: bash
        run: timeout 50s python3 scripts/update_airport_parking.py

      - name: Report airport fallback
        if: steps.airport.outcome == 'failure'
        shell: bash
        run: |
          echo "::warning::Airport parking live fetch failed. Preserving the last valid airport-parking.json while publishing fresh crew parking data."

      - name: Publish both parking data files safely
        shell: bash
        run: bash scripts/commit_parking_files.sh
