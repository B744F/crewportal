name: Update Parking Data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Parking Data
        run: |
          mkdir -p data

          curl -s "http://1.34.202.50:9130/parking_place/huahang" \
          | jq '{
              BOT: (map(select(.name=="BOT"))[0].remaining_space // "--"),
              TSA: (map(select(.name=="TSA"))[0].remaining_space // "--"),
              RD1A: (map(select(.name=="RD1 A"))[0].remaining_space // "--"),
              RD1B: (map(select(.name=="RD1 B"))[0].remaining_space // "--"),
              updatedAt: (map(.updateTime) | max // "--"),
              raw: .
            }' > data/parking.json

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/parking.json

          git diff --cached --quiet || git commit -m "Auto update parking data"

          git push
