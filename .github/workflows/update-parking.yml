name: Update Parking Data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crewportal-data-writes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch and validate parking data
        shell: bash
        run: timeout 65s python3 scripts/update_parking.py

      - name: Publish parking data safely
        shell: bash
        run: bash scripts/commit_data_file.sh data/parking.json "Update parking data"
