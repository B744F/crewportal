name: Update Parking Data

on:
  schedule:
    - cron: "2-59/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crewportal-data-writes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch and validate parking data
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data
          tmp="$(mktemp)"
          url="http://1.34.202.50:9130/parking_place/huahang"

          echo "Fetching parking data from ${url}"
          curl --fail --silent --show-error \
            --connect-timeout 8 \
            --max-time 20 \
            --retry 3 \
            --retry-delay 3 \
            --retry-all-errors \
            "$url" -o "$tmp"

          # Require valid JSON and all four expected parking areas before replacing the live file.
          jq -e '
            type == "array" and
            ([.[].name] | index("BOT") != null) and
            ([.[].name] | index("TSA") != null) and
            ([.[].name] | index("RD1 A") != null) and
            ([.[].name] | index("RD1 B") != null) and
            all(.[]; (.remaining_space | type) == "number") and
            all(.[]; (.updateTime | type) == "string" and length > 0)
          ' "$tmp" >/dev/null

          jq '.' "$tmp" > data/parking.json
          rm -f "$tmp"

      - name: Commit parking data safely
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- data/parking.json; then
            echo "No parking data change detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/parking.json
          git commit -m "Update parking data"

          # Rebase before push so ARINC and parking updates cannot leave conflict markers.
          git pull --rebase origin main
          git push origin HEAD:main
