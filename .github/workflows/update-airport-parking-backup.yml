name: Update Airport Parking Data Backup (Disabled)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crewportal-parking-writes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch and validate airport parking data
        shell: bash
        run: timeout 50s python3 scripts/update_airport_parking.py

      - name: Publish airport parking data safely
        shell: bash
        run: bash scripts/commit_data_file.sh data/airport-parking.json "Manual airport parking backup recovery"
