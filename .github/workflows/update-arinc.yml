name: Update ARINC Pacific HF

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-arinc-pacific-hf
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Install parser dependency
        run: python3 -m pip install --disable-pip-version-check beautifulsoup4

      - name: Fetch and validate Pacific HF
        run: timeout 60s python3 scripts/update_arinc.py

      - name: Commit updated ARINC data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/arinc.json
          if git diff --cached --quiet; then
            echo "No ARINC data changes to commit."
            exit 0
          fi
          git commit -m "Update ARINC Pacific HF data"
          git push
