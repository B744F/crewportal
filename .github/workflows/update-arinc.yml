name: Update ARINC Pacific HF

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Install browser
        run: |
          pip install playwright
          playwright install chromium

      - name: Fetch ARINC debug page
        run: python3 scripts/update_arinc.py

      - name: Upload ARINC debug HTML
        uses: actions/upload-artifact@v4
        with:
          name: arinc-debug-html
          path: debug_arinc.html
