name: Update ARINC Pacific HF

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crewportal-data-writes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch and validate complete assignment
        shell: bash
        run: |
          set -euo pipefail
          timeout 45s python3 scripts/update_arinc.py

      - name: Commit verified assignment
        shell: bash
        run: |
          if git diff --quiet -- data/arinc.json; then
            echo "No verified assignment change."
            exit 0
          fi
          python3 -m json.tool data/arinc.json >/dev/null
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/arinc.json
          git commit -m "Update verified ARINC Pacific HF data"
          git pull --rebase origin main
          git push origin HEAD:main
